<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Emitir Senha</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #1f2937;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 16px;
        }

        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .topo h1 {
            margin: 0 0 8px;
        }

        .topo p {
            margin: 0;
            color: #6b7280;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-secundario {
            background: #e5e7eb;
            color: #111827;
        }

        .mensagem {
            padding: 12px 14px;
            margin-bottom: 16px;
            border-radius: 10px;
            font-weight: 500;
        }

        .success {
            background: #dcfce7;
            color: #166534;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
        }

        .card-botao {
            background: #fff;
            border: none;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,.06);
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease;
            text-align: center;
        }

        .card-botao:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0,0,0,.10);
        }

        .titulo-botao {
            display: block;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .subtitulo-botao {
            color: #6b7280;
            font-size: 15px;
        }

        @media (max-width: 700px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    {% if messages %}
        {% for message in messages %}
            <div class="mensagem {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="topo">
        <div>
            <h1>Emissão de Senha</h1>
            <p>Escolha o tipo de atendimento para gerar a senha do cliente.</p>
        </div>

        <a href="{% url 'dashboard' %}" class="btn btn-secundario">Início</a>
    </div>

    <div class="grid">
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="tipo_prioridade" value="preferencial">
            <input type="hidden" name="tipo_atendimento" value="particular">
            <button type="submit" class="card-botao" style="width:100%;">
                <span class="titulo-botao">Preferencial Particular</span>
                <span class="subtitulo-botao">Gera senha do tipo PP</span>
            </button>
        </form>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="tipo_prioridade" value="preferencial">
            <input type="hidden" name="tipo_atendimento" value="convenio">
            <button type="submit" class="card-botao" style="width:100%;">
                <span class="titulo-botao">Preferencial Convênio</span>
                <span class="subtitulo-botao">Gera senha do tipo PC</span>
            </button>
        </form>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="tipo_prioridade" value="normal">
            <input type="hidden" name="tipo_atendimento" value="particular">
            <button type="submit" class="card-botao" style="width:100%;">
                <span class="titulo-botao">Normal Particular</span>
                <span class="subtitulo-botao">Gera senha do tipo NP</span>
            </button>
        </form>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="tipo_prioridade" value="normal">
            <input type="hidden" name="tipo_atendimento" value="convenio">
            <button type="submit" class="card-botao" style="width:100%;">
                <span class="titulo-botao">Normal Convênio</span>
                <span class="subtitulo-botao">Gera senha do tipo NC</span>
            </button>
        </form>
    </div>
</div>
</body>
</html>
